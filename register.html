<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="header-content">
    <img src="/login_join.svg" class="logo">
  </div>
</header>

<main class="main">

  <div class="login-container">

    <h1>Sign Up</h1>


    <div class="input-wrapper">
      <input id="name" type="text" placeholder="Name">
    </div>

    <div id="name-error" class="error"></div>


    <div class="input-wrapper">
      <input id="email" type="email" placeholder="Email">
    </div>

    <div id="email-error" class="error"></div>

    <div class="input-wrapper">
      <input id="password" type="password" placeholder="Password">
    </div>

    <div id="password-error" class="error"></div>


    <div class="input-wrapper">
      <input id="confirm-password" type="password" placeholder="Confirm Password">
    </div>

    <div id="confirm-error" class="error"></div>

    <div class="privacy">
      <input type="checkbox" id="privacy">
      <label for="privacy">I accept the Privacy Policy</label>
    </div>

    <div id="privacy-error" class="error"></div>


    <div class="button-group">
      <button id="signup-btn" class="signup-btn">Sign Up</button>
    </div>

  </div>

</main>

<footer class="footer">
  <a href="#">Privacy Policy</a>
  <a href="#">Legal notice</a>
</footer>

<script type="module" src="js/register.js"></script>

</body>
</html>
