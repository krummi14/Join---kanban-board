<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/icon/favicon.svg" type="image/x-icon">
  <title>Your contacts in Join</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../style/assets.css">
  <link rel="stylesheet" href="../style/standard.css">
  <link rel="stylesheet" href="../style/contacts.css">

  <script src="../js/template/contacts_template.js"></script>
  <script src="../js/list.js"></script>
  <script src="../js/assets.js"></script>
  <script src="../js/contact.js"></script>
  <script src="../js/firebase.js"></script>
</head>

<body onload="initContacts()">
  <section class="sidebar">
    <div class="logo_nav">
      <img class="logo" src="../assets/img/join_logo.svg" alt="Join Logo">
      <nav class="nav">
        <ul>
          <li><a href="./summary.html"><img class="summery" src="../assets/icon/summary_off.svg" alt="summery"></a></li>
          <li><a href="./add_task.html"><img class="add_task" src="../assets/icon/add_off.svg" alt="add task"></a></li>
          <li><a href="./board.html"><img class="board" src="../assets/icon/board_off.svg" alt="board"></a></li>
          <li><a href="./contacts.html"><img class="contact" src="../assets/icon/contact_off.svg" alt="contact"></a>
          </li>
        </ul>
      </nav>
    </div>
    <ul class="police_legal">
      <li><a href="./privacy_policy.html">Privacy Policy</a></li>
      <li><a href="./legal_notice.html">Legal Notice</a></li>
    </ul>
  </section>

  <section class="content">
    <header class="header_framework">
      <p>Kanban Project Management Tool</p>
      <div>
        <img src="../assets/icon/help_off.svg" alt="help icon">
        <!-- id for user name -->
        <div id="user">G</div>
        <section class="logout_menu">
          <a href="./legal_notice.html">Legal Notice</a>
          <a href="./privacy_policy.html">Privacy Policy</a>
          <a href="#" onclick="logout()">Log out</a>
        </section>
      </div>
    </header>

    <main class="main_framework">
      <div class="contact_main">
        <section class="contact_list">
          <div class="contact_list_scrollmethode">
            <div class="background_add_contact_button">
              <button class="button_basic_characteristics add_contact_button" onclick="openAddNewContactDialog(null, event)">
                <p class="add_contact_text">Add new contact</p>
                <img class="add_contact_icon" src="../assets/icon/person_add.svg" alt="Add contact icon">
              </button>
            </div>
            <div id="list_content" class="list_content"></div>
          </div>

          <div id="addNew_contact_dialog_content">

          </div>
        </section>

        <section class="contact_content">
          <span class="contact_content_header_and_slogan">
            <h2 class="contact_headline_h2">Contacts</h2>
            <div class="vertical_divider"></div>
            <h3 class="contact_slogan">Better with a team</h3>
          </span>

          <div id="contact_information" class="contact_information_deactive">

          </div>

          <div id="contact_dialog_content">

          </div>

        </section>
      </div>
    </main>

  </section>
  <!--<script type="module"src="../js/contact.js"></script>-->
  <script src="../script.js"></script>
</body>

</html>
