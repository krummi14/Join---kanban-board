<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
  <title>Your contacts in Join</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../style/assets.css">
  <link rel="stylesheet" href="../style/standard.css">
  <link rel="stylesheet" href="../style/contacts.css">

  <!--<script src="../js/template/contacts_template.js"></script>-->
  <!--<script src="../js/list.js"></script>-->
  <!--<script src="../js/assets.js"></script>-->
  <!--<script src="../js/contact.js"></script>-->
  <!--<script src="../js/firebase.js"></script>-->
</head>

<body onload="initContacts()">
  <section class="sidebar">
    <div class="logo_nav">
      <img class="logo" src="../assets/img/join_logo.svg" alt="Join Logo">
      <nav class="nav">
        <ul>
          <li><a href="./summary.html"><img class="summery" src="../assets/icon/summary_off.svg" alt="summery"></a></li>
          <li><a href="./add_task.html"><img class="add_task" src="../assets/icon/add_off.svg" alt="add task"></a></li>
          <li><a href="./board.html"><img class="board" src="../assets/icon/board_off.svg" alt="board"></a></li>
          <li><a href="./contacts.html"><img class="contact" src="../assets/icon/contact_off.svg" alt="contact"></a>
          </li>
        </ul>
      </nav>
    </div>
    <ul class="police_legal">
      <li><a href="./privacy_policy.html">Privacy Policy</a></li>
      <li><a href="./legal_notice.html">Legal Notice</a></li>
    </ul>
  </section>

  <section class="content" id="content">
    <header class="header_framework">
      <img class="join_logo_respo" src="../assets/img/join_logo_respo.svg" alt="">
      <p class="join_header_text">Kanban Project Management Tool</p>
      <div>
        <img class="help_icon" src="../assets/icon/help_off.svg" alt="help icon">
        <!-- id for user name -->
        <div id="user" onclick="addMenu()">G</div>
        <section id="logout_menu" class="logout_menu">
          <a class="help_logout_menu" href="./help.html">Help</a>
          <a href="./legal_notice.html">Legal Notice</a>
          <a href="./privacy_policy.html">Privacy Policy</a>
          <a href="#" onclick="logout()">Log out</a>
        </section>
      </div>
    </header>

    <div>
      <main class="main_framework">
        <div id="contact_main" class="contact_main">
          <section class="contact_list">
            <div class="contact_list_scrollmethode">
              <div class="background_add_contact_button">
                <button class="button_basic_characteristics add_contact_button"
                  onclick="openAddNewContactDialog(null, event)">
                  <p>Add new contact</p>
                  <img class="add_contact_icon" src="../assets/icon/person_add.svg" alt="Add contact icon">
                </button>
              </div>
              <div id="list_content" class="list_content"></div>
            </div>

            <div id="addNew_contact_dialog_content">

            </div>
          </section>

          <section id="contact_content" class="contact_content responsive_contactInformation_none" onclick="addEditAndDeleteResponisve(event)">
            <button class="back_button_contactInformation_mobile" onclick="closeContactInformationResponsive()">
              <img src="../assets/icon/vector.svg" alt="back button"></button>

            <button class="edit_and_add_button_responsive" onclick="addEditAndDeleteResponisve(event)">
              <img src="../assets/icon/more_vert.svg" alt="edit contact button">
            </button>

            <span class="contact_content_header_and_slogan">
              <h2 class="contact_headline_h2">Contacts</h2>
              <div class="slogan_mobile">
                <div class="vertical_divider"></div>
                <div class="horizontal_divider_slogan"></div>
                <h3 class="contact_slogan">Better with a team</h3>
              </div>
            </span>

            <div id="contact_information" class="contact_information_deactive">

            </div>

            <div id="contact_dialog_edit_button_content"></div>

          </section>

          <div id="contact_dialog_content">

          </div>

          <button class="edit_and_add_button_responsive" onclick="openAddNewContactDialog(null, event)">
            <img src="../assets/icon/person_add.svg" alt="add contact button">
          </button>

        </div>
      </main>
      <footer id="responsive_menu" class="responsive_menu">
        <a href="./summary.html" class="responsive_menu_button">
          <img class="responsive_menu_img responsive_menu_summary_img" src="../assets/icon/summary_respo.svg"
            alt="summary_respo_icon">
          <p class="responsive_menu_text">Summary</p>
        </a>
        <a href="./add_task.html" class="responsive_menu_button">
          <img class="responsive_menu_img responsive_menu_add_task_img" src="../assets/icon/add_task_respo.svg"
            alt="add_task_respo_icon">
          <p class="responsive_menu_text">Add Task</p>
        </a>
        <a href="./board.html" class="responsive_menu_button">
          <img class="responsive_menu_img responsive_menu_board_img" src="../assets/icon/board_icon_respo.svg"
            alt="board_respo_icon">
          <p class="responsive_menu_text">Board</p>
        </a>
        <a href="./contacts.html" class="responsive_menu_button">
          <img class="responsive_menu_img responsive_menu_contacts_img" src="../assets/icon/contacts_respo.svg"
            alt="contacts_respo_icon">
          <p class="responsive_menu_text">Contacts</p>
        </a>
      </footer>
    </div>

  </section>
  <script src="../script.js"></script>
  <script type="module" src="../js/template/contacts_template.js"></script>
  <script type="module" src="../js/contact.js"></script>
  <script type="module" src="../js/assets.js"></script>
  <script type="module" src="../js/list.js"></script>

</body>

</html>
