<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
  <title>Join</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../style/assets.css">
  <link rel="stylesheet" href="../style/standard.css">
  <link rel="stylesheet" href="../style/add_task.css">
</head>

<body onload="initAddTask()">
  <section class="sidebar">
    <div class="logo_nav">
      <img class="logo" src="../assets/img/join_logo.svg" alt="Join Logo">
      <nav class="nav">
        <ul>
          <li><a href="./summary.html"><img class="summery" src="../assets/icon/summary_off.svg" alt="summery"></a></li>
          <li><a href="./add_task.html"><img class="add_task" src="../assets/icon/add_off.svg" alt="add task"></a></li>
          <li><a href="./board.html"><img class="board" src="../assets/icon/board_off.svg" alt="board"></a></li>
          <li><a href="./contact.html"><img class="contact" src="../assets/icon/contact_off.svg" alt="contact"></a></li>
        </ul>
      </nav>
    </div>
    <ul class="police_legal">
      <li><a href="./privacy_policy.html">Privacy Policy</a></li>
      <li><a href="./legal_notice.html">Legal Notice</a></li>
    </ul>
  </section>

  <section class="content">
    <header class="header_framework">
      <p>Kanban Project Management Tool</p>
      <div>
        <img src="../assets/icon/help_off.svg" alt="help icon">
        <div id="user">G
          <!-- gen user name -->
        </div>
        <section class="logout_menu">
          <a href="./legal_notice.html">Legal Notice</a>
          <a href="./privacy_policy.html">Privacy Policy</a>
          <a href="#" onclick="logout()">Log out</a>
        </section>
      </div>
    </header>

    <main class="main_framework">
      <section class="main_header">
        <h1>Add Task</h1>
      </section>

      <form id="taskForm">

        <section class="left_form">
          <div>
            <label for="title">Title<span>*</span></label>
            <input type="text" id="title" name="title" placeholder="Enter a title" required>
          </div>

          <div>
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Enter a description" required></textarea>
          </div>

          <div>
            <label for="dueDate">Due Date<span>*</span></label>
            <input type="date" id="dueDate" name="dueDate" required>
          </div>
        </section>

        <hr>

        <section class="right_form">
          <section class="priority_assignee">
            <label for="priority">Priority:</label>
            <select  id="priority" name="priority" required>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>

            <label for="assignee">Assignee:</label>
            <input type="text" id="assignee" name="assignee" required>
          </section>

          <section class="form_buttons">
            <button type="reset">Clear</button>
            <button type="submit">Create Task</button>
          </section>
        </section>

      </form>

    </main>

  </section>

  <script src="../js/addTask.js"></script>
  <script src="../script.js"></script>
</body>

</html>
