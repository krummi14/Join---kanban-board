<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
  <title>Join</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../style/assets.css">
  <link rel="stylesheet" href="../style/standard.css">
  <link rel="stylesheet" href="../style/summery.css">
</head>

<body onload="initSummery()">
  <section class="sidebar">
    <div class="logo_nav">
      <img class="logo" src="../assets/img/join_logo.svg" alt="Join Logo">
      <nav class="nav">
        <ul>
          <li><a href="./summary.html"><img class="summery" src="../assets/icon/summary_off.svg" alt="summery"></a></li>
          <li><a href="./add_task.html"><img class="add_task" src="../assets/icon/add_off.svg" alt="add task"></a></li>
          <li><a href="./board.html"><img class="board" src="../assets/icon/board_off.svg" alt="board"></a></li>
          <li><a href="./contacts.html"><img class="contact" src="../assets/icon/contact_off.svg" alt="contact"></a></li>
        </ul>
      </nav>
    </div>
    <ul class="police_legal">
      <li><a href="./privacy_policy.html">Privacy Policy</a></li>
      <li><a href="./legal_notice.html">Legal Notice</a></li>
    </ul>
  </section>

  <section class="content">
    <header class="header_framework">
      <p>Kanban Project Management Tool</p>
      <div>
        <img src="../assets/icon/help_off.svg" alt="help icon">
        <!-- id for user name -->
        <div id="user">G</div>
      </div>
    </header>

    <main class="main_framework">
      <section class="main_header">
        <h1>Join 360</h1>
        <hr>
        <p>Key Metrics at a Glance</p>
      </section>

      <section class="key_matix">

        <section class="todo_done">
          <div class="to_do">
            <img src="../assets/icon/to_do.svg" alt="to do icon">
            <!-- id for count template -->
            <div id="to_do_count">0<br><span>To-do</span></div>
          </div>
          <div class="done">
            <img src="../assets/icon/done.svg" alt="done icon">
            <!-- id for count template -->
            <div id="done_count">0<br><span>Done</span></div>
          </div>
        </section>

        <div class="urgent">
          <img src="../assets/icon/urgent.svg" alt="urgent icon">
          <!-- id for count template -->
          <div id="urgent_count">0<br><span>Urgent</span></div>
          <hr>
          <!-- id for deadline template -->
          <div id="deadline">November 11, 2026<br><span>Upcoming Deadline</span></div>
        </div>

        <div class="tasks">
          <div class="tasks_in_board">
            <div id="board_count">0<br><span>Tasks in <br> Board</span></div>
          </div>

          <div class="tasks_in_progress">
            <div id="progress_count">0<br><span>Tasks in <br> Progress</span></div>
          </div>

          <div class="awaiting_feedback">
            <div id="feedback_count">0<br><span>Awaiting <br> Feedback</span></div>
          </div>
        </div>

      </section>

      <section id="good_morning">
        <h2>Good Morning!</h2>
      </section>
    </main>
    
  </section>

  <script src="../script.js"></script>
  <script src="../js/summery.js"></script>

</body>

</html>
