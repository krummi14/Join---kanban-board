<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
  <title>Join</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../style/assets.css">
  <link rel="stylesheet" href="../style/standard.css">
  <link rel="stylesheet" href="../style/board.css">

  <script type="module" src="../js/board.js"></script>
  <script type="module" src="../js/template/board_template.js"></script>
</head>

<body onload="initBoard()">
  <section class="sidebar">
    <div class="logo_nav">
      <img class="logo" src="../assets/img/join_logo.svg" alt="Join Logo">
      <nav class="nav">
        <ul>
          <li><a href="./summary.html"><img class="summery" src="../assets/icon/summary_off.svg" alt="summery"></a></li>
          <li><a href="./add_task.html"><img class="add_task" src="../assets/icon/add_off.svg" alt="add task"></a></li>
          <li><a href="./board.html"><img class="board" src="../assets/icon/board_off.svg" alt="board"></a></li>
          <li><a href="./contacts.html"><img class="contact" src="../assets/icon/contact_off.svg" alt="contact"></a>
          </li>
        </ul>
      </nav>
    </div>
    <ul class="police_legal">
      <li><a href="./privacy_policy.html">Privacy Policy</a></li>
      <li><a href="./legal_notice.html">Legal Notice</a></li>
    </ul>
  </section>

  <section class="content">
    <header class="header_framework">
      <p>Kanban Project Management Tool</p>
      <div>
        <img src="../assets/icon/help_off.svg" alt="help icon">
        <div id="user">G
          <!-- gen user name -->
        </div>
        <section class="logout_menu">
          <a href="/html/legal_notice.html">Legal Notice</a>
          <a href="/html/privacy_policy.html">Privacy Policy</a>
          <a href="#" onclick="logout()">Log out</a>
        </section>
      </div>
    </header>

    <main class="main_framework">
      <div class="board_main">

        <section class="main_header">
          <h1>Board</h1>
          <div class="input_wrapper_direction">
            <div class="input-wrapper input-wrapper_size">
              <input id="" class="input_size" type="text" placeholder="Find Task">
              <div class="input-icon input_icon_border_left">
                <button class="close_button">
                  <img src="/assets/icon/search.svg" class=" search_icon_size" />
                </button>
              </div>
            </div>
            <button class="button_basic_characteristics add_task_button" onclick="openAddNewtaskDialog()">
              <p>Add task</p>
              <img class="add_contact_icon" src="../assets/icon/add.svg" alt="Add icon">
            </button>
          </div>
        </section>

        <section class="main_drag_and_drop">
          <div class="drag_content_gap">
            <div class="drag_area_header">
              <h4>To do</h4>
              <button class="plus_add_task_button">+</button>
            </div>
            <div class="drag_area" id="to_do" ondrop="moveTo('to_do')" ondragleave="removeHighlight('to_do')"
              ondragover="allowDrop(event); highlight('to_do')"></div>
          </div>
          <div class="drag_content_gap">
            <div class="drag_area_header">
              <h4>In progress</h4>
              <button class="plus_add_task_button">+</button>
            </div>
            <div class="drag_area" id="in_progress" ondrop="moveTo('in_progress')"
              ondragleave="removeHighlight('in_progress')" ondragover="allowDrop(event); highlight('in_progress')">
            </div>
          </div>
          <div class="drag_content_gap">
            <div class="drag_area_header">
              <h4>Await feedback</h4>
              <button class="plus_add_task_button">+</button>
            </div>
            <div class="drag_area" id="await_feedback" ondrop="moveTo('await_feedback')"
              ondragleave="removeHighlight('await_feedback')"
              ondragover="allowDrop(event); highlight('await_feedback')">
            </div>
          </div>
          <div class="drag_content_gap">
            <div class="drag_area_header">
              <h4>Done</h4>
            </div>
            <div class="drag_area" id="done" ondrop="moveTo('done')" ondragleave="removeHighlight('done')"
              ondragover="allowDrop(event); highlight('done')">
            </div>
          </div>

        </section>

      </div>
    </main>

  </section>
  <div id="overlay" class="overlay hidden"></div>
  <script src="../script.js"></script>
</body>

</html>
