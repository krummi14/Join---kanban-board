<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Join Please Login</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="./style/standard.css">
  <link rel="stylesheet" href="./style/assets.css">
  <link rel="stylesheet" href="./style/fonts.css">
  <link rel="stylesheet" href="./style/login_register.css">
</head>

<body class="login_body">
  <div class="splash_screen" id="splash_screen">
    <img src="/assets/img/login_join.svg" class="splash_logo" id="splash_logo" />
    <img src="/assets/img/login_join_white.svg" class="splash_logo_mobile" id="splash_logo" />
  </div>

  <header class="header-login">
    <div class="header-login-content">
      <img src="/assets/img/login_join.svg" class="logo" />

      <div class="header-login-right desktop-only">
        <span class="not_a_user_text_size">Not a Join user?</span>
        <button class="button_basic_characteristics"><a class="signup-link" href="./register.html">Sign up</a></button>
      </div>
    </div>
  </header>

  <main class="main-login">
    <div class="login-container">
      <h1 class="h1-mrg-btm">Log in</h1>

      <div class="input-wrapper">
        <input id="email" type="email" placeholder="Email" />
        <img src="/assets/img/mail.svg" class="input-icon" />
      </div>

      <div id="email-error" class="error"></div>

      <div class="input-wrapper">
        <input id="password" type="password" placeholder="Password" />
        <img src="/assets/img/lock.svg" class="input-icon" />
      </div>

      <div id="password-error" class="error"></div>
      <div class="button-group">
        <button class="button_basic_characteristics" id="login-btn">Log in</button>
        <button class="button_basic_characteristics basic-btn-secondary guest-btn">Guest Log in</button>
      </div>
    </div>
    <div class="signup-section mobile-only">
      <span class="not_a_user_text_size">Not a Join user?</span>
      <button class="button_basic_characteristics signup-btn">Sign up</button>
    </div>
  </main>

  <footer class="footer-login">
    <a href="/html/legal_notice.html">Legal Notice</a>
    <a href="/html/privacy_policy.html">Privacy Policy</a>
  </footer>

  <script src="script.js"></script>
  <script type="module" src="./js/login.js"></script>
  <script type="module" src="./js/list.js"></script>
</body>

</html>
